name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      # `uv sync` once to establish the env. Subsequent commands use
      # `--no-sync` so uv does not re-install editable workspace members
      # mid-job (uv 0.11.x intermittently flips `.pth` files to macOS
      # hidden, which Python 3.13's site.py skips — see SESSION-NOTES.md).
      - name: Sync workspace
        run: uv sync --group dev

      - name: ruff check
        run: uv run --no-sync ruff check .

      - name: ruff format check
        run: uv run --no-sync ruff format --check .

      - name: mypy --strict
        run: uv run --no-sync mypy

      - name: package-boundary check
        run: bash scripts/check-boundaries.sh

      - name: pytest
        run: uv run --no-sync pytest -q
