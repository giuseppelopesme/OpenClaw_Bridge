info:
  title: OpenClaw Bridge
  version: 1.0.0
openapi: 3.1.0
paths:
  /v1/agent/drafts:
    get:
      operationId: list_drafts_v1_agent_drafts_get
      parameters:
      - in: query
        name: agent
        required: false
        schema:
          anyOf:
          - pattern: ^[a-z][a-z0-9_]{0,31}$
            type: string
          - type: 'null'
          title: Agent
      - in: query
        name: status
        required: false
        schema:
          anyOf:
          - enum:
            - pending
            - approved
            - rejected
            - sent
            - send_failed
            type: string
          - type: 'null'
          title: Status
      - in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftListResponse'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Drafts
      tags:
      - agent
    post:
      operationId: create_draft_v1_agent_drafts_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Draft
      tags:
      - agent
  /v1/agent/drafts/{draft_id}:
    get:
      operationId: get_draft_v1_agent_drafts__draft_id__get
      parameters:
      - in: path
        name: draft_id
        required: true
        schema:
          minLength: 1
          title: Draft Id
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_DraftOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Draft
      tags:
      - agent
    patch:
      operationId: patch_draft_v1_agent_drafts__draft_id__patch
      parameters:
      - in: path
        name: draft_id
        required: true
        schema:
          minLength: 1
          title: Draft Id
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DraftPatchRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_DraftOut'
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Patch Draft
      tags:
      - agent
  /v1/auth/whoami:
    get:
      operationId: whoami_v1_auth_whoami_get
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoamiResponse'
          description: Successful Response
      summary: Whoami
      tags:
      - auth
  /v1/calendar/events:
    get:
      operationId: list_events_v1_calendar_events_get
      parameters:
      - in: query
        name: from
        required: true
        schema:
          minLength: 1
          title: From
          type: string
      - in: query
        name: to
        required: true
        schema:
          minLength: 1
          title: To
          type: string
      - in: query
        name: calendar
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Calendar
      responses:
        '200':
          content:
