# OpenClaw bridge Redis configuration.
#
# Bound to loopback only — the bridge is the sole client. Persistence is
# off because pub/sub is ephemeral in v1; replay-able streams are a future
# add. Memory ceiling keeps Redis from competing with the LLM working set.
#
# `requirepass` is loaded from a file the bootstrap script materialises
# from macOS Keychain (`provider.redis`); we do NOT commit it here.
# See `scripts/run-redis.sh` for how the password is wired at start time.

bind 127.0.0.1
port 6379
protected-mode yes

# Disable persistence — pub/sub is ephemeral.
save ""
appendonly no

# Cap memory; evict cold keys when we hit it. Plenty for pub/sub +
# small rate-limit buckets.
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logs go to stderr (so launchd / our scripts can capture them as JSON
# alongside bridge logs). No file logging.
logfile ""
loglevel notice

# Reasonable client limits for local dev.
timeout 0
tcp-keepalive 60

# requirepass is supplied at start time via `--requirepass <secret>` from
# the launcher script — never via this file, so the secret stays in
# Keychain rather than on disk.
